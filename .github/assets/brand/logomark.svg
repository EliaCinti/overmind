<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Overmind logomark">
  <defs>
    <linearGradient id="lm-bg" x1="0" y1="0" x2="220" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d1730"/>
      <stop offset="0.55" stop-color="#1a1523"/>
      <stop offset="1" stop-color="#150f1f"/>
    </linearGradient>
    <linearGradient id="lm-violet" x1="70" y1="70" x2="150" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9d7bff"/>
      <stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <radialGradient id="lm-glow" cx="0.28" cy="0.22" r="0.75">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Self-contained dark tile: renders identically in light and dark GitHub themes -->
  <rect width="220" height="220" rx="46" fill="url(#lm-bg)"/>
  <rect width="220" height="220" rx="46" fill="url(#lm-glow)"/>
  <rect x="1.5" y="1.5" width="217" height="217" rx="44.5" fill="none" stroke="#7c5cff" stroke-opacity="0.55" stroke-width="3"/>

  <!-- Orchestration hub: a bright central mind wiring four satellite worker nodes -->
  <g stroke="url(#lm-violet)" stroke-width="5.7" stroke-linecap="round">
    <line x1="110" y1="110" x2="79.2" y2="77"/>
    <line x1="110" y1="110" x2="143" y2="81.4"/>
    <line x1="110" y1="110" x2="77" y2="140.8"/>
    <line x1="110" y1="110" x2="143" y2="140.8"/>
  </g>
  <g fill="#c9bcff">
    <circle cx="79.2" cy="77" r="9.2"/>
    <circle cx="143" cy="81.4" r="9.2"/>
    <circle cx="77" cy="140.8" r="9.2"/>
    <circle cx="143" cy="140.8" r="9.2"/>
  </g>
  <circle cx="110" cy="110" r="18.5" fill="url(#lm-violet)"/>
  <circle cx="110" cy="110" r="7.5" fill="#f2eeff"/>
</svg>
