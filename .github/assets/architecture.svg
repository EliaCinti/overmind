<svg width="1000" height="440" viewBox="0 0 1000 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="How Overmind works: a company node passes a server-enforced budget gate to three agents in isolated git worktrees, each reading and writing organizational memory (Wadachi) over MCP.">
  <defs>
    <linearGradient id="arch-bg" x1="0" y1="0" x2="1000" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d1730"/>
      <stop offset="0.55" stop-color="#1a1523"/>
      <stop offset="1" stop-color="#150f1f"/>
    </linearGradient>
    <!-- Fine engineering grid: minor 40px, major 200px (blueprint register) -->
    <pattern id="arch-grid-minor" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#c9bcff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <pattern id="arch-grid-major" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M200 0 H0 V200" fill="none" stroke="#c9bcff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Self-contained dark card: renders identically on light + dark GitHub themes -->
  <rect width="1000" height="440" rx="28" fill="url(#arch-bg)"/>
  <rect width="1000" height="440" rx="28" fill="url(#arch-grid-minor)"/>
  <rect width="1000" height="440" rx="28" fill="url(#arch-grid-major)"/>
  <rect x="1.5" y="1.5" width="997" height="437" rx="26.5" fill="none" stroke="#7c5cff" stroke-opacity="0.3" stroke-width="2"/>

  <!-- eyebrow -->
  <text x="48" y="52" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="12.5" font-weight="600" letter-spacing="3" fill="#c9bcff">CONTROL PLANE &#183; co &#8594; gate &#8594; agents &#8594; memory</text>

  <!-- ===== Layer 1: the company ===== -->
  <g>
    <rect x="405" y="72" width="190" height="46" rx="10" fill="#221a33" stroke="#7c5cff" stroke-opacity="0.55" stroke-width="1.5"/>
    <text x="421" y="91" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="12.5" fill="#f2eeff">co://acme-corp</text>
    <text x="421" y="107" font-family="'Inter Variable','Inter','Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#a99cd6">1 &#183; one server runs your agent company</text>
  </g>

  <!-- connector: company -> gate -->
  <line x1="500" y1="118" x2="500" y2="140" stroke="#a99cd6" stroke-opacity="0.5" stroke-width="1.5"/>

  <!-- ===== Layer 2: the budget gate (amber = the in_review/approval hue: enforcement that can hold) ===== -->
  <g>
    <rect x="385" y="140" width="230" height="46" rx="10" fill="#221a33" stroke="#f5b73d" stroke-opacity="0.55" stroke-width="1.5"/>
    <text x="401" y="159" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="12.5" fill="#f2eeff">gate://budget</text>
    <text x="401" y="175" font-family="'Inter Variable','Inter','Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#f5b73d">2 &#183; server-enforced &#183; &#8804; $40/mo</text>
  </g>

  <!-- connectors: gate -> agents (orthogonal blueprint elbows) -->
  <g fill="none" stroke-linejoin="round" stroke-width="1.5">
    <path d="M420 186 V210 H300 V244" stroke="#a99cd6" stroke-opacity="0.45"/>
    <path d="M500 186 V244" stroke="#a99cd6" stroke-opacity="0.45"/>
    <!-- the held lane: one agent stopped at the gate -->
    <path d="M580 186 V210 H700 V244" stroke="#ff6b7a" stroke-opacity="0.75"/>
  </g>

  <!-- per-lane spend chips: the gate's verdict, in dollars -->
  <g font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" text-anchor="middle">
    <rect x="270" y="216" width="60" height="18" rx="9" fill="#1a1523" stroke="#9d7bff" stroke-opacity="0.5" stroke-width="1"/>
    <text x="300" y="228" fill="#c9bcff">$4.20</text>
    <rect x="470" y="216" width="60" height="18" rx="9" fill="#1a1523" stroke="#46cf9c" stroke-opacity="0.5" stroke-width="1"/>
    <text x="500" y="228" fill="#46cf9c">$2.40 &#10003;</text>
    <rect x="670" y="216" width="60" height="18" rx="9" fill="#1a1523" stroke="#ff6b7a" stroke-opacity="0.55" stroke-width="1"/>
    <text x="700" y="228" fill="#ff6b7a">limit</text>
  </g>

  <!-- ===== Layer 3: agents, each in an isolated git worktree; status hues are the app's own ===== -->
  <g>
    <rect x="220" y="244" width="160" height="58" rx="10" fill="#221a33" stroke="#6d6386" stroke-opacity="0.35" stroke-width="1"/>
    <circle cx="364" cy="261" r="4" fill="#9d7bff"/>
    <text x="236" y="265" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="12.5" fill="#f2eeff">agt-01</text>
    <text x="236" y="281" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="10" fill="#6d6386">wt://task-0341</text>
    <text x="236" y="295" font-family="'Inter Variable','Inter','Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="500" fill="#9d7bff">aria &#183; in_progress</text>
  </g>
  <g>
    <rect x="420" y="244" width="160" height="58" rx="10" fill="#221a33" stroke="#6d6386" stroke-opacity="0.35" stroke-width="1"/>
    <circle cx="564" cy="261" r="4" fill="#46cf9c"/>
    <text x="436" y="265" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="12.5" fill="#f2eeff">agt-02</text>
    <text x="436" y="281" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="10" fill="#6d6386">wt://task-0342</text>
    <text x="436" y="295" font-family="'Inter Variable','Inter','Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="500" fill="#46cf9c">lume &#183; done</text>
  </g>
  <g>
    <rect x="620" y="244" width="160" height="58" rx="10" fill="#221a33" stroke="#ff6b7a" stroke-opacity="0.55" stroke-width="1.5"/>
    <circle cx="764" cy="261" r="4" fill="#ff6b7a"/>
    <text x="636" y="265" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="12.5" fill="#f2eeff">agt-03</text>
    <text x="636" y="281" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="10" fill="#6d6386">wt://task-0343</text>
    <text x="636" y="295" font-family="'Inter Variable','Inter','Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="500" fill="#ff6b7a">penna &#183; blocked</text>
  </g>
  <text x="236" y="322" font-family="'Inter Variable','Inter','Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#a99cd6">3 &#183; every task runs in its own isolated git worktree</text>

  <!-- ===== Layer 4: every agent reads/writes organizational memory over MCP (dashed bus) ===== -->
  <g fill="none" stroke="#a99cd6" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="5 5" stroke-linejoin="round">
    <path d="M300 336 V352"/>
    <path d="M500 336 V352"/>
    <path d="M700 336 V352"/>
    <path d="M300 352 H700"/>
    <path d="M500 352 V366"/>
  </g>
  <text x="712" y="349" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="10" fill="#6d6386">mcp</text>

  <g>
    <rect x="390" y="366" width="220" height="46" rx="10" fill="#221a33" stroke="#7c5cff" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="406" y="385" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="12.5" fill="#f2eeff">wadachi://memory</text>
    <text x="406" y="401" font-family="'Inter Variable','Inter','Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#a99cd6">4 &#183; the org reads &amp; writes what it learns</text>
    <!-- accumulated records, fading with age -->
    <rect x="556" y="374" width="40" height="4" rx="2" fill="#9d7bff" fill-opacity="0.38"/>
    <rect x="556" y="382" width="30" height="4" rx="2" fill="#9d7bff" fill-opacity="0.25"/>
    <rect x="556" y="390" width="35" height="4" rx="2" fill="#9d7bff" fill-opacity="0.15"/>
  </g>

  <!-- blueprint title block -->
  <text x="952" y="424" text-anchor="end" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" letter-spacing="1.5" fill="#6d6386">OVMD-CP-001 &#183; CONTROL PLANE &#183; SCALE 1:1 &#183; REV A</text>
</svg>
