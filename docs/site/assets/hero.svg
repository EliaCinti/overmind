<svg width="1000" height="360" viewBox="0 0 1000 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Overmind — the mind that runs your agent company. Your org leaves a track; Overmind remembers it.">
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="1000" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d1730"/>
      <stop offset="0.55" stop-color="#1a1523"/>
      <stop offset="1" stop-color="#150f1f"/>
    </linearGradient>
    <!-- Ruts (轍) brighten from a faint 'past' (left) into the luminous 'present' (right) -->
    <linearGradient id="hero-track" x1="40" y1="180" x2="885" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6d6386" stop-opacity="0.10"/>
      <stop offset="0.55" stop-color="#7c5cff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#9d7bff" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="hero-title" x1="56" y1="150" x2="56" y2="212" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f4f1ff"/>
      <stop offset="1" stop-color="#d9d1f5"/>
    </linearGradient>
    <radialGradient id="hero-present" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f0c07a" stop-opacity="0.95"/>
      <stop offset="0.35" stop-color="#9d7bff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hero-glow" cx="0.82" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Calm, on-brand motion. The SVG's own media context honors the visitor's
       reduced-motion preference even when embedded via <img>. -->
  <style>
    .ruts line {
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      animation: rut-draw 1.5s cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
    }
    .ruts line:nth-child(1) { animation-delay: 0.05s; }
    .ruts line:nth-child(2) { animation-delay: 0.14s; }
    .ruts line:nth-child(3) { animation-delay: 0.23s; }
    .ruts line:nth-child(4) { animation-delay: 0.32s; }
    .ruts line:nth-child(5) { animation-delay: 0.41s; }
    .ruts line:nth-child(6) { animation-delay: 0.50s; }
    .ruts line:nth-child(7) { animation-delay: 0.59s; }
    @keyframes rut-draw { to { stroke-dashoffset: 0; } }

    .dots circle { opacity: 0; animation: dot-in 0.6s ease forwards; }
    .dots circle:nth-child(1) { animation-delay: 0.7s; }
    .dots circle:nth-child(2) { animation-delay: 0.8s; }
    .dots circle:nth-child(3) { animation-delay: 0.9s; }
    .dots circle:nth-child(4) { animation-delay: 1.0s; }
    .dots circle:nth-child(5) { animation-delay: 1.1s; }
    .dots circle:nth-child(6) { animation-delay: 1.2s; }
    .dots circle:nth-child(7) { animation-delay: 1.3s; }
    @keyframes dot-in { to { opacity: 1; } }

    /* the amber present-node breathes, slowly */
    .present { transform-box: fill-box; transform-origin: center; }
    .present-glow { animation: ember-breathe 3.6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .present-core { animation: ember-core 3.6s ease-in-out infinite; }
    @keyframes ember-breathe {
      0%, 100% { transform: scale(1); opacity: 0.95; }
      50%      { transform: scale(1.08); opacity: 1; }
    }
    @keyframes ember-core {
      0%, 100% { opacity: 0.85; }
      50%      { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .ruts line { stroke-dashoffset: 0; animation: none; }
      .dots circle { opacity: 1; animation: none; }
      .present-glow, .present-core { animation: none; }
    }
  </style>

  <!-- Self-contained dark card: renders identically on light + dark GitHub themes -->
  <rect width="1000" height="360" rx="28" fill="url(#hero-bg)"/>
  <rect width="1000" height="360" rx="28" fill="url(#hero-glow)"/>
  <rect x="1.5" y="1.5" width="997" height="357" rx="26.5" fill="none" stroke="#7c5cff" stroke-opacity="0.35" stroke-width="2"/>

  <!-- MEMORY FIELD: parallel ruts receding to the 'present' node on the right -->
  <g class="ruts" stroke="url(#hero-track)" stroke-width="2" stroke-linecap="round">
    <line x1="520" y1="70"  x2="884" y2="180" pathLength="1"/>
    <line x1="520" y1="104" x2="884" y2="180" pathLength="1"/>
    <line x1="510" y1="140" x2="884" y2="180" pathLength="1"/>
    <line x1="508" y1="180" x2="884" y2="180" pathLength="1"/>
    <line x1="510" y1="220" x2="884" y2="180" pathLength="1"/>
    <line x1="520" y1="256" x2="884" y2="180" pathLength="1"/>
    <line x1="520" y1="290" x2="884" y2="180" pathLength="1"/>
  </g>

  <!-- Stored memories: dots accumulating along the ruts, brighter toward 'now' -->
  <g class="dots" fill="#c9bcff">
    <circle cx="612" cy="120" r="2.6" fill-opacity="0.35"/>
    <circle cx="640" cy="214" r="2.6" fill-opacity="0.35"/>
    <circle cx="690" cy="150" r="3.1" fill-opacity="0.55"/>
    <circle cx="712" cy="205" r="3.1" fill-opacity="0.55"/>
    <circle cx="770" cy="132" r="3.6" fill-opacity="0.8"/>
    <circle cx="788" cy="200" r="3.6" fill-opacity="0.85"/>
    <circle cx="820" cy="166" r="4" fill-opacity="0.95"/>
  </g>

  <!-- The present: bright violet node with a warm memory ember at its core -->
  <g class="present">
    <circle class="present-glow" cx="884" cy="180" r="46" fill="url(#hero-present)"/>
    <circle cx="884" cy="180" r="14" fill="#9d7bff"/>
    <circle class="present-core" cx="884" cy="180" r="6" fill="#f4ecd8"/>
  </g>

  <!-- eyebrow -->
  <text x="56" y="112" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="15" font-weight="600" letter-spacing="3.5" fill="#c9bcff">MEMORY-NATIVE ORCHESTRATION</text>

  <!-- wordmark (Inter; falls back to system sans where Inter is absent) -->
  <text x="54" y="204" font-family="'Inter Variable','Inter','Segoe UI',Helvetica,Arial,sans-serif" font-size="82" font-weight="700" letter-spacing="-2.5" fill="url(#hero-title)">Overmind</text>

  <!-- tagline (canonical) -->
  <text x="56" y="250" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="18" fill="#a99cd6">the mind that runs your agent company.</text>

  <!-- signature line: the differentiator, stated plainly; amber is the memory-ember tell -->
  <text x="56" y="300" font-family="'Inter Variable','Inter','Segoe UI',Helvetica,Arial,sans-serif" font-size="16" font-weight="500" fill="#e7e1f7">Your org leaves a track. <tspan fill="#f0c07a">Overmind remembers it.</tspan></text>
</svg>
