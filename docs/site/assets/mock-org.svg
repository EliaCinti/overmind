<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" width="1000" height="680" font-family="Inter, -apple-system, Segoe UI, sans-serif" role="img" aria-label="The Overmind org chart: the human owner at the root, with agents reporting up through a manager, each card showing role, autonomy and remaining budget.">
  <rect width="1000" height="680" fill="#1b1a21"/>

  <!-- top bar -->
  <rect x="0" y="0" width="1000" height="56" fill="#201f27"/>
  <line x1="0" y1="56" x2="1000" y2="56" stroke="#34333b" stroke-width="1"/>
  <rect x="24" y="20" width="16" height="16" rx="5" fill="#9b7df5"/>
  <text x="48" y="33" fill="#e9e8ee" font-size="15" font-weight="600">Overmind</text>
  <rect x="392" y="16" width="150" height="24" rx="7" fill="#2b2a32"/>
  <text x="429" y="32" fill="#a5a3ad" font-size="12" text-anchor="middle">Board</text>
  <rect x="467" y="18" width="73" height="20" rx="6" fill="#9b7df5"/>
  <text x="503" y="32" fill="#1b1a21" font-size="12" font-weight="600" text-anchor="middle">Org</text>

  <!-- ROOT: You (owner) -->
  <g transform="translate(170,84)">
    <rect width="660" height="62" rx="11" fill="#232229" stroke="#34333b"/>
    <rect x="16" y="15" width="32" height="32" rx="8" fill="#9b7df5"/>
    <!-- crown -->
    <path d="M25 37 l-2.5-11 5 4 4.5-7 4.5 7 5-4 -2.5 11 z" fill="#1b1a21"/>
    <text x="62" y="30" fill="#e9e8ee" font-size="14.5" font-weight="600">You</text>
    <text x="62" y="47" fill="#a5a3ad" font-size="12">Owner · everyone ultimately reports here</text>
    <rect x="560" y="17" width="84" height="28" rx="8" fill="none" stroke="#34333b"/>
    <text x="602" y="35" fill="#c9bcff" font-size="12" text-anchor="middle">＋ Hire</text>
  </g>

  <!-- rail from root to children -->
  <line x1="196" y1="146" x2="196" y2="560" stroke="#34333b" stroke-width="1.5"/>

  <!-- CHILD 1: Aria (manager) -->
  <line x1="196" y1="192" x2="214" y2="192" stroke="#34333b" stroke-width="1.5"/>
  <g transform="translate(214,166)">
    <rect width="616" height="52" rx="11" fill="#232229" stroke="#34333b"/>
    <rect x="14" y="12" width="28" height="28" rx="7" fill="#9b7df5" opacity="0.16"/>
    <!-- eye (code reviewer/tech lead) -->
    <path d="M22 26 q6 -7 12 0 q-6 7 -12 0 z" fill="none" stroke="#b79bf7" stroke-width="1.6"/><circle cx="28" cy="26" r="2.2" fill="#b79bf7"/>
    <text x="54" y="24" fill="#e9e8ee" font-size="13.5" font-weight="600">Aria</text>
    <text x="54" y="40" fill="#a5a3ad" font-size="11.5">CEO / Tech Lead · manages 3</text>
    <rect x="360" y="16" width="118" height="20" rx="6" fill="#2b2a32"/>
    <text x="419" y="30" fill="#a5a3ad" font-size="10.5" text-anchor="middle">Act within budget</text>
    <text x="600" y="30" fill="#c7c6cf" font-family="JetBrains Mono, monospace" font-size="12" text-anchor="end">$18.40</text>
  </g>

  <!-- Aria's rail -->
  <line x1="240" y1="218" x2="240" y2="488" stroke="#34333b" stroke-width="1.5"/>

  <!-- grandchild: Rusto -->
  <line x1="240" y1="262" x2="258" y2="262" stroke="#34333b" stroke-width="1.5"/>
  <g transform="translate(258,238)">
    <rect width="572" height="48" rx="11" fill="#232229" stroke="#34333b"/>
    <rect x="14" y="11" width="26" height="26" rx="7" fill="#6fa0e6" opacity="0.15"/>
    <path d="M20 24 h14 M20 20 h14 M20 28 h14" stroke="#7aa8ea" stroke-width="1.6"/>
    <text x="52" y="22" fill="#e9e8ee" font-size="13" font-weight="600">Rusto</text>
    <text x="52" y="37" fill="#a5a3ad" font-size="11.5">Backend developer</text>
    <rect x="330" y="14" width="112" height="20" rx="6" fill="#2b2a32"/>
    <text x="386" y="28" fill="#a5a3ad" font-size="10.5" text-anchor="middle">Act with approval</text>
    <text x="556" y="28" fill="#c7c6cf" font-family="JetBrains Mono, monospace" font-size="12" text-anchor="end">$9.15</text>
  </g>

  <!-- grandchild: Kaede -->
  <line x1="240" y1="332" x2="258" y2="332" stroke="#34333b" stroke-width="1.5"/>
  <g transform="translate(258,308)">
    <rect width="572" height="48" rx="11" fill="#232229" stroke="#34333b"/>
    <rect x="14" y="11" width="26" height="26" rx="7" fill="#e0b45c" opacity="0.15"/>
    <circle cx="27" cy="24" r="7" fill="none" stroke="#e0b45c" stroke-width="1.6"/><circle cx="24" cy="22" r="1.3" fill="#e0b45c"/><circle cx="30" cy="22" r="1.3" fill="#e0b45c"/><circle cx="27" cy="27" r="1.3" fill="#e0b45c"/>
    <text x="52" y="22" fill="#e9e8ee" font-size="13" font-weight="600">Kaede</text>
    <text x="52" y="37" fill="#a5a3ad" font-size="11.5">Frontend developer</text>
    <rect x="330" y="14" width="112" height="20" rx="6" fill="#2b2a32"/>
    <text x="386" y="28" fill="#a5a3ad" font-size="10.5" text-anchor="middle">Act with approval</text>
    <text x="556" y="28" fill="#c7c6cf" font-family="JetBrains Mono, monospace" font-size="12" text-anchor="end">$6.02</text>
  </g>

  <!-- grandchild: Penna -->
  <line x1="240" y1="402" x2="258" y2="402" stroke="#34333b" stroke-width="1.5"/>
  <g transform="translate(258,378)">
    <rect width="572" height="48" rx="11" fill="#232229" stroke="#34333b"/>
    <rect x="14" y="11" width="26" height="26" rx="7" fill="#5ec695" opacity="0.15"/>
    <rect x="21" y="17" width="12" height="15" rx="2" fill="none" stroke="#5ec695" stroke-width="1.5"/><path d="M24 22 h6 M24 26 h6" stroke="#5ec695" stroke-width="1.3"/>
    <text x="52" y="22" fill="#e9e8ee" font-size="13" font-weight="600">Penna</text>
    <text x="52" y="37" fill="#a5a3ad" font-size="11.5">Technical writer</text>
    <rect x="356" y="14" width="86" height="20" rx="6" fill="#2b2a32"/>
    <text x="399" y="28" fill="#a5a3ad" font-size="10.5" text-anchor="middle">Propose only</text>
    <text x="556" y="28" fill="#c7c6cf" font-family="JetBrains Mono, monospace" font-size="12" text-anchor="end">$3.80</text>
  </g>

  <!-- CHILD 2: Sentinel (security, reports to owner) -->
  <line x1="196" y1="486" x2="214" y2="486" stroke="#34333b" stroke-width="1.5"/>
  <g transform="translate(214,462)">
    <rect width="616" height="48" rx="11" fill="#232229" stroke="#34333b"/>
    <rect x="14" y="11" width="26" height="26" rx="7" fill="#e77c6b" opacity="0.15"/>
    <path d="M27 15 l8 3 v6 c0 5-3.5 8.5-8 10 -4.5-1.5-8-5-8-10 v-6 z" fill="none" stroke="#e77c6b" stroke-width="1.5"/>
    <text x="54" y="22" fill="#e9e8ee" font-size="13" font-weight="600">Sentinel</text>
    <text x="54" y="38" fill="#a5a3ad" font-size="11.5">Security engineer</text>
    <rect x="374" y="14" width="104" height="20" rx="6" fill="#2b2a32"/>
    <text x="426" y="28" fill="#a5a3ad" font-size="10.5" text-anchor="middle">Propose only</text>
    <text x="600" y="28" fill="#c7c6cf" font-family="JetBrains Mono, monospace" font-size="12" text-anchor="end">$5.00</text>
  </g>

  <text x="170" y="562" fill="#6d6386" font-size="11.5" font-family="JetBrains Mono, monospace">6 agents · budgets remaining, refreshed live</text>
</svg>
