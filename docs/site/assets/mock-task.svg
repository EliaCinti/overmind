<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" width="1000" height="680" font-family="Inter, -apple-system, Segoe UI, sans-serif" role="img" aria-label="The Overmind task-detail drawer: a task's status and priority, its assigned agent, a live session with branch and spend, a diff of changed files, and status-transition actions.">
  <rect width="1000" height="680" fill="#1b1a21"/>

  <!-- dimmed board behind -->
  <g opacity="0.35">
    <rect x="0" y="0" width="1000" height="56" fill="#201f27"/>
    <rect x="24" y="88" width="150" height="560" rx="10" fill="#232229"/>
    <rect x="192" y="88" width="150" height="560" rx="10" fill="#232229"/>
    <rect x="360" y="88" width="150" height="560" rx="10" fill="#232229"/>
  </g>
  <rect x="0" y="0" width="440" height="680" fill="#000000" opacity="0.30"/>

  <!-- drawer -->
  <rect x="440" y="0" width="560" height="680" fill="#1b1a21"/>
  <line x1="440" y1="0" x2="440" y2="680" stroke="#34333b" stroke-width="1"/>

  <!-- drawer header -->
  <g transform="translate(472,40)">
    <text x="0" y="0" fill="#8b8994" font-family="JetBrains Mono, monospace" font-size="11">TASK-142</text>
    <text x="496" y="2" fill="#a5a3ad" font-size="18" text-anchor="end">✕</text>
    <text x="0" y="34" fill="#e9e8ee" font-size="21" font-weight="700">Hash-chain: verify endpoint</text>
    <!-- status + priority -->
    <rect x="0" y="52" width="98" height="24" rx="7" fill="#ab8cf2" opacity="0.16"/>
    <circle cx="16" cy="64" r="4" fill="#ab8cf2"/>
    <text x="28" y="68" fill="#c3aef6" font-size="12" font-weight="600">In progress</text>
    <text x="112" y="68" fill="#e0b45c" font-size="12">↑ high</text>
    <rect x="392" y="52" width="104" height="24" rx="12" fill="#9b7df5" opacity="0.16"/>
    <text x="444" y="68" fill="#b79bf7" font-size="11.5" text-anchor="middle">◈ Aria</text>
  </g>

  <line x1="472" y1="150" x2="968" y2="150" stroke="#34333b" stroke-width="1"/>

  <!-- session card -->
  <g transform="translate(472,172)">
    <text x="0" y="0" fill="#a5a3ad" font-size="12" font-weight="600" letter-spacing="0.5">SESSION</text>
    <rect x="0" y="12" width="496" height="96" rx="11" fill="#232229" stroke="#34333b"/>
    <circle cx="22" cy="38" r="5" fill="#5ec695"/>
    <text x="36" y="42" fill="#e9e8ee" font-size="13" font-weight="500">Running · claude-opus</text>
    <text x="476" y="42" fill="#a5a3ad" font-family="JetBrains Mono, monospace" font-size="12" text-anchor="end">4m 12s</text>
    <!-- branch + spend row -->
    <text x="22" y="70" fill="#8b8994" font-size="11">⎇ branch</text>
    <text x="86" y="70" fill="#c9bcff" font-family="JetBrains Mono, monospace" font-size="11.5">agent/hash-chain-verify</text>
    <text x="22" y="92" fill="#8b8994" font-size="11">spend</text>
    <text x="86" y="92" fill="#c7c6cf" font-family="JetBrains Mono, monospace" font-size="11.5">$0.42</text>
    <text x="476" y="92" fill="#8b8994" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="end">of $2.00 budget</text>
  </g>

  <!-- diff -->
  <g transform="translate(472,308)">
    <text x="0" y="0" fill="#a5a3ad" font-size="12" font-weight="600" letter-spacing="0.5">CHANGES</text>
    <text x="496" y="0" fill="#8b8994" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="end">3 files · +128 −14</text>
    <rect x="0" y="12" width="496" height="132" rx="11" fill="#232229" stroke="#34333b"/>
    <g font-family="JetBrains Mono, monospace" font-size="11.5">
      <text x="18" y="38" fill="#c7c6cf">src/audit/verify.rs</text>
      <text x="476" y="38" fill="#5ec695" text-anchor="end">+86</text>
      <text x="18" y="66" fill="#c7c6cf">src/audit/mod.rs</text>
      <text x="476" y="66" fill="#5ec695" text-anchor="end">+31</text>
      <text x="18" y="94" fill="#c7c6cf">tests/audit_chain.rs</text>
      <text x="476" y="94" fill="#5ec695" text-anchor="end">+11 −14</text>
      <text x="18" y="124" fill="#6d6386">GET /audit/verify → 200 { intact: true, head: 0x7f3a… }</text>
    </g>
  </g>

  <!-- actions -->
  <g transform="translate(472,480)">
    <text x="0" y="0" fill="#a5a3ad" font-size="12" font-weight="600" letter-spacing="0.5">MOVE TO</text>
    <rect x="0" y="14" width="150" height="40" rx="10" fill="#9b7df5"/>
    <text x="75" y="39" fill="#1b1a21" font-size="13" font-weight="600" text-anchor="middle">In review</text>
    <rect x="162" y="14" width="120" height="40" rx="10" fill="none" stroke="#34333b"/>
    <text x="222" y="39" fill="#e0a97a" font-size="13" text-anchor="middle">Blocked</text>
    <rect x="294" y="14" width="120" height="40" rx="10" fill="none" stroke="#34333b"/>
    <text x="354" y="39" fill="#a5a3ad" font-size="13" text-anchor="middle">Cancel</text>
  </g>

  <!-- approval note -->
  <g transform="translate(472,566)">
    <rect x="0" y="0" width="496" height="52" rx="11" fill="#e0b45c" opacity="0.08"/>
    <rect x="0" y="0" width="496" height="52" rx="11" fill="none" stroke="#e0b45c" stroke-opacity="0.35"/>
    <text x="18" y="24" fill="#e0b45c" font-size="12" font-weight="600">Approval gate</text>
    <text x="18" y="42" fill="#c7c6cf" font-size="11.5">This agent acts with approval — the move waits for your sign-off.</text>
  </g>
</svg>
