<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" width="1000" height="680" font-family="Inter, -apple-system, Segoe UI, sans-serif" role="img" aria-label="The Overmind hire dialog: a three-level (pick, tune, expert) flow to hire an agent — choose an archetype, then autonomy, review strictness, model and budget, with a live plain-language preview.">
  <rect width="1000" height="680" fill="#1b1a21"/>
  <rect width="1000" height="680" fill="#000000" opacity="0.45"/>

  <!-- dialog -->
  <rect x="190" y="60" width="620" height="562" rx="16" fill="#201f27" stroke="#34333b"/>

  <!-- header -->
  <g transform="translate(222,96)">
    <text x="0" y="0" fill="#e9e8ee" font-size="20" font-weight="700">Hire an agent</text>
    <text x="556" y="-2" fill="#a5a3ad" font-size="17" text-anchor="end">✕</text>
    <!-- level segmented (progressive disclosure) -->
    <rect x="0" y="18" width="270" height="30" rx="8" fill="#2b2a32"/>
    <rect x="2" y="20" width="88" height="26" rx="7" fill="#9b7df5"/>
    <text x="46" y="37" fill="#1b1a21" font-size="12.5" font-weight="600" text-anchor="middle">Pick</text>
    <text x="134" y="37" fill="#a5a3ad" font-size="12.5" text-anchor="middle">Tune</text>
    <text x="222" y="37" fill="#a5a3ad" font-size="12.5" text-anchor="middle">Expert</text>
  </g>

  <line x1="222" y1="160" x2="778" y2="160" stroke="#34333b" stroke-width="1"/>

  <!-- archetype grid -->
  <g transform="translate(222,182)">
    <text x="0" y="0" fill="#a5a3ad" font-size="12" font-weight="600" letter-spacing="0.5">ROLE</text>
    <!-- row 1 -->
    <!-- Security -->
    <g transform="translate(0,14)">
      <rect width="176" height="58" rx="11" fill="#232229" stroke="#34333b"/>
      <path d="M26 16 l9 3 v7 c0 5.5-4 9.5-9 11 -5-1.5-9-5.5-9-11 v-7 z" fill="none" stroke="#a5a3ad" stroke-width="1.5"/>
      <text x="48" y="27" fill="#e9e8ee" font-size="13" font-weight="600">Security eng.</text>
      <text x="48" y="44" fill="#8b8994" font-size="11">audits &amp; hardening</text>
    </g>
    <!-- Backend (SELECTED) -->
    <g transform="translate(190,14)">
      <rect width="176" height="58" rx="11" fill="#9b7df5" fill-opacity="0.12" stroke="#9b7df5" stroke-width="1.6"/>
      <path d="M18 22 h16 M18 27 h16 M18 32 h16" stroke="#b79bf7" stroke-width="1.7"/>
      <text x="48" y="27" fill="#e9e8ee" font-size="13" font-weight="600">Backend dev</text>
      <text x="48" y="44" fill="#a99cd6" font-size="11">Rust · axum · SQLite</text>
      <circle cx="160" cy="16" r="8" fill="#9b7df5"/><path d="M156 16 l3 3 5-5" stroke="#1b1a21" stroke-width="1.6" fill="none"/>
    </g>
    <!-- Frontend -->
    <g transform="translate(380,14)">
      <rect width="176" height="58" rx="11" fill="#232229" stroke="#34333b"/>
      <circle cx="26" cy="27" r="8" fill="none" stroke="#a5a3ad" stroke-width="1.5"/><circle cx="23" cy="24" r="1.4" fill="#a5a3ad"/><circle cx="30" cy="24" r="1.4" fill="#a5a3ad"/><circle cx="27" cy="30" r="1.4" fill="#a5a3ad"/>
      <text x="48" y="27" fill="#e9e8ee" font-size="13" font-weight="600">Frontend dev</text>
      <text x="48" y="44" fill="#8b8994" font-size="11">React · Tailwind</text>
    </g>
    <!-- row 2 -->
    <g transform="translate(0,84)">
      <rect width="176" height="58" rx="11" fill="#232229" stroke="#34333b"/>
      <path d="M18 27 q8 -8 16 0 q-8 8 -16 0 z" fill="none" stroke="#a5a3ad" stroke-width="1.5"/><circle cx="26" cy="27" r="2.4" fill="#a5a3ad"/>
      <text x="48" y="27" fill="#e9e8ee" font-size="13" font-weight="600">Code reviewer</text>
      <text x="48" y="44" fill="#8b8994" font-size="11">quality gate</text>
    </g>
    <g transform="translate(190,84)">
      <rect width="176" height="58" rx="11" fill="#232229" stroke="#34333b"/>
      <circle cx="24" cy="25" r="7" fill="none" stroke="#a5a3ad" stroke-width="1.5"/><path d="M29 30 l6 6" stroke="#a5a3ad" stroke-width="1.6"/>
      <text x="48" y="27" fill="#e9e8ee" font-size="13" font-weight="600">Researcher</text>
      <text x="48" y="44" fill="#8b8994" font-size="11">digs &amp; reports</text>
    </g>
    <g transform="translate(380,84)">
      <rect width="176" height="58" rx="11" fill="#232229" stroke="#34333b"/>
      <rect x="19" y="18" width="14" height="18" rx="2" fill="none" stroke="#a5a3ad" stroke-width="1.5"/><path d="M23 24 h6 M23 28 h6" stroke="#a5a3ad" stroke-width="1.3"/>
      <text x="48" y="27" fill="#e9e8ee" font-size="13" font-weight="600">Tech writer</text>
      <text x="48" y="44" fill="#8b8994" font-size="11">docs &amp; ADRs</text>
    </g>
  </g>

  <!-- autonomy segmented -->
  <g transform="translate(222,398)">
    <text x="0" y="0" fill="#a5a3ad" font-size="12" font-weight="600" letter-spacing="0.5">AUTONOMY</text>
    <rect x="0" y="12" width="556" height="34" rx="9" fill="#2b2a32"/>
    <text x="93" y="34" fill="#a5a3ad" font-size="12.5" text-anchor="middle">Propose only</text>
    <rect x="186" y="14" width="184" height="30" rx="8" fill="#9b7df5"/>
    <text x="278" y="34" fill="#1b1a21" font-size="12.5" font-weight="600" text-anchor="middle">Act with approval</text>
    <text x="463" y="34" fill="#a5a3ad" font-size="12.5" text-anchor="middle">Act within budget</text>
  </g>

  <!-- model + budget row -->
  <g transform="translate(222,460)">
    <text x="0" y="0" fill="#a5a3ad" font-size="12" font-weight="600" letter-spacing="0.5">MODEL</text>
    <rect x="0" y="12" width="270" height="38" rx="9" fill="#232229" stroke="#34333b"/>
    <text x="16" y="36" fill="#e9e8ee" font-family="JetBrains Mono, monospace" font-size="12.5">claude-opus</text>
    <text x="254" y="36" fill="#a5a3ad" font-size="12" text-anchor="end">▾</text>
    <text x="286" y="0" fill="#a5a3ad" font-size="12" font-weight="600" letter-spacing="0.5">BUDGET</text>
    <rect x="286" y="12" width="270" height="38" rx="9" fill="#232229" stroke="#34333b"/>
    <text x="302" y="36" fill="#e9e8ee" font-family="JetBrains Mono, monospace" font-size="12.5">$ 10.00</text>
    <text x="540" y="36" fill="#8b8994" font-size="11" text-anchor="end">/ month</text>
  </g>

  <!-- live preview -->
  <g transform="translate(222,528)">
    <rect x="0" y="0" width="556" height="42" rx="10" fill="#f0c07a" opacity="0.07"/>
    <rect x="0" y="0" width="556" height="42" rx="10" fill="none" stroke="#f0c07a" stroke-opacity="0.30"/>
    <text x="16" y="26" fill="#c7c6cf" font-size="12.5">✦ <tspan fill="#f0c07a" font-weight="600">Rusto</tspan>, a Backend developer, acts on tasks once you approve each start.</text>
  </g>

  <!-- footer buttons -->
  <g transform="translate(222,586)">
    <rect x="416" y="0" width="140" height="38" rx="10" fill="#9b7df5"/>
    <text x="486" y="24" fill="#1b1a21" font-size="13" font-weight="600" text-anchor="middle">Hire agent</text>
    <rect x="316" y="0" width="88" height="38" rx="10" fill="none" stroke="#34333b"/>
    <text x="360" y="24" fill="#a5a3ad" font-size="13" text-anchor="middle">Cancel</text>
  </g>
</svg>
