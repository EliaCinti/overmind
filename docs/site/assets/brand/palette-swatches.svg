<svg width="980" height="470" viewBox="0 0 980 470" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Overmind brand palette">
  <defs>
    <linearGradient id="pl-bg" x1="0" y1="0" x2="980" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d1730"/>
      <stop offset="0.55" stop-color="#1a1523"/>
      <stop offset="1" stop-color="#150f1f"/>
    </linearGradient>
    <linearGradient id="pl-title" x1="40" y1="34" x2="40" y2="66" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f4f1ff"/>
      <stop offset="1" stop-color="#d9d1f5"/>
    </linearGradient>
    <radialGradient id="pl-glow" cx="0.9" cy="0.1" r="0.8">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Self-contained dark card: renders identically in light and dark GitHub themes -->
  <rect width="980" height="470" rx="24" fill="url(#pl-bg)"/>
  <rect width="980" height="470" rx="24" fill="url(#pl-glow)"/>
  <rect x="1" y="1" width="978" height="468" rx="23" fill="none" stroke="#7c5cff" stroke-opacity="0.35" stroke-width="2"/>

  <!-- Header -->
  <text x="40" y="60" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="-0.5" fill="url(#pl-title)">Overmind — palette</text>
  <text x="42" y="88" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="500" fill="#a99cd6">Violet-forward, dark-first. Accent is for large text and UI, not body copy.</text>

  <!-- Column headers -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5" fill="#8f83b8">
    <text x="40" y="150">ACCENT</text>
    <text x="272" y="150">SURFACE</text>
    <text x="504" y="150">TEXT</text>
    <text x="736" y="150">SEMANTIC</text>
  </g>

  <!-- Swatch chips: rect + name + hex -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <!-- ACCENT -->
    <g transform="translate(40,168)">
      <rect width="58" height="46" rx="11" fill="#7c5cff" stroke="#6d6386" stroke-opacity="0.4"/>
      <text x="72" y="20" font-size="16" font-weight="600" fill="#e7e1f7">Accent 500</text>
      <text x="72" y="39" font-size="14" font-weight="500" fill="#a99cd6">#7c5cff</text>
    </g>
    <g transform="translate(40,236)">
      <rect width="58" height="46" rx="11" fill="#9d7bff" stroke="#6d6386" stroke-opacity="0.4"/>
      <text x="72" y="20" font-size="16" font-weight="600" fill="#e7e1f7">Accent 400</text>
      <text x="72" y="39" font-size="14" font-weight="500" fill="#a99cd6">#9d7bff</text>
    </g>
    <g transform="translate(40,304)">
      <rect width="58" height="46" rx="11" fill="#c9bcff" stroke="#6d6386" stroke-opacity="0.4"/>
      <text x="72" y="20" font-size="16" font-weight="600" fill="#e7e1f7">Accent 200</text>
      <text x="72" y="39" font-size="14" font-weight="500" fill="#a99cd6">#c9bcff</text>
    </g>
    <!-- The one warm token: memory-ember, reserved for the memory tell (present-node core, 'remembers' highlight) -->
    <g transform="translate(40,372)">
      <rect width="58" height="46" rx="11" fill="#f0c07a" stroke="#6d6386" stroke-opacity="0.4"/>
      <text x="72" y="20" font-size="16" font-weight="600" fill="#e7e1f7">Memory Ember</text>
      <text x="72" y="39" font-size="14" font-weight="500" fill="#a99cd6">#f0c07a</text>
    </g>

    <!-- SURFACE -->
    <g transform="translate(272,168)">
      <rect width="58" height="46" rx="11" fill="#150f1f" stroke="#6d6386" stroke-opacity="0.4"/>
      <text x="72" y="20" font-size="16" font-weight="600" fill="#e7e1f7">Ink 950</text>
      <text x="72" y="39" font-size="14" font-weight="500" fill="#a99cd6">#150f1f</text>
    </g>
    <g transform="translate(272,236)">
      <rect width="58" height="46" rx="11" fill="#1a1523" stroke="#6d6386" stroke-opacity="0.4"/>
      <text x="72" y="20" font-size="16" font-weight="600" fill="#e7e1f7">Canvas 900</text>
      <text x="72" y="39" font-size="14" font-weight="500" fill="#a99cd6">#1a1523</text>
    </g>
    <g transform="translate(272,304)">
      <rect width="58" height="46" rx="11" fill="#221a33" stroke="#6d6386" stroke-opacity="0.4"/>
      <text x="72" y="20" font-size="16" font-weight="600" fill="#e7e1f7">Surface 800</text>
      <text x="72" y="39" font-size="14" font-weight="500" fill="#a99cd6">#221a33</text>
    </g>
    <g transform="translate(272,372)">
      <rect width="58" height="46" rx="11" fill="#2a2140" stroke="#6d6386" stroke-opacity="0.4"/>
      <text x="72" y="20" font-size="16" font-weight="600" fill="#e7e1f7">Raised 700</text>
      <text x="72" y="39" font-size="14" font-weight="500" fill="#a99cd6">#2a2140</text>
    </g>

    <!-- TEXT -->
    <g transform="translate(504,168)">
      <rect width="58" height="46" rx="11" fill="#f2eeff" stroke="#6d6386" stroke-opacity="0.4"/>
      <text x="72" y="20" font-size="16" font-weight="600" fill="#e7e1f7">Text Hi</text>
      <text x="72" y="39" font-size="14" font-weight="500" fill="#a99cd6">#f2eeff</text>
    </g>
    <g transform="translate(504,236)">
      <rect width="58" height="46" rx="11" fill="#e7e1f7" stroke="#6d6386" stroke-opacity="0.4"/>
      <text x="72" y="20" font-size="16" font-weight="600" fill="#e7e1f7">Text Body</text>
      <text x="72" y="39" font-size="14" font-weight="500" fill="#a99cd6">#e7e1f7</text>
    </g>
    <g transform="translate(504,304)">
      <rect width="58" height="46" rx="11" fill="#a99cd6" stroke="#6d6386" stroke-opacity="0.4"/>
      <text x="72" y="20" font-size="16" font-weight="600" fill="#e7e1f7">Text Muted</text>
      <text x="72" y="39" font-size="14" font-weight="500" fill="#a99cd6">#a99cd6</text>
    </g>
    <g transform="translate(504,372)">
      <rect width="58" height="46" rx="11" fill="#6d6386" stroke="#6d6386" stroke-opacity="0.4"/>
      <text x="72" y="20" font-size="16" font-weight="600" fill="#e7e1f7">Text Faint</text>
      <text x="72" y="39" font-size="14" font-weight="500" fill="#a99cd6">#6d6386</text>
    </g>

    <!-- SEMANTIC -->
    <g transform="translate(736,168)">
      <rect width="58" height="46" rx="11" fill="#46cf9c" stroke="#6d6386" stroke-opacity="0.4"/>
      <text x="72" y="20" font-size="16" font-weight="600" fill="#e7e1f7">Success</text>
      <text x="72" y="39" font-size="14" font-weight="500" fill="#a99cd6">#46cf9c</text>
    </g>
    <g transform="translate(736,236)">
      <rect width="58" height="46" rx="11" fill="#f5b73d" stroke="#6d6386" stroke-opacity="0.4"/>
      <text x="72" y="20" font-size="16" font-weight="600" fill="#e7e1f7">Warning</text>
      <text x="72" y="39" font-size="14" font-weight="500" fill="#a99cd6">#f5b73d</text>
    </g>
    <g transform="translate(736,304)">
      <rect width="58" height="46" rx="11" fill="#ff6b7a" stroke="#6d6386" stroke-opacity="0.4"/>
      <text x="72" y="20" font-size="16" font-weight="600" fill="#e7e1f7">Danger</text>
      <text x="72" y="39" font-size="14" font-weight="500" fill="#a99cd6">#ff6b7a</text>
    </g>
  </g>
</svg>
