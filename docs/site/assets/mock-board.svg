<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, -apple-system, Segoe UI, sans-serif" role="img" aria-label="The Overmind Kanban board: six columns — Backlog, To do, In progress, In review, Blocked, Done — each with a status hue, holding task cards assigned to agents.">
  <!-- app dark tokens (OKLCH → hex): bg 0.17, card 0.205, border 0.29, muted-fg 0.68, primary 0.7/285 -->
  <rect width="1200" height="720" fill="#1b1a21"/>

  <!-- top bar -->
  <rect x="0" y="0" width="1200" height="56" fill="#201f27"/>
  <line x1="0" y1="56" x2="1200" y2="56" stroke="#34333b" stroke-width="1"/>
  <rect x="24" y="20" width="16" height="16" rx="5" fill="#9b7df5"/>
  <text x="48" y="33" fill="#e9e8ee" font-size="15" font-weight="600">Overmind</text>
  <line x1="150" y1="18" x2="150" y2="38" stroke="#34333b" stroke-width="1"/>
  <text x="166" y="33" fill="#a5a3ad" font-size="13">Elia’s · Overmind</text>
  <!-- view toggle -->
  <rect x="470" y="16" width="150" height="24" rx="7" fill="#2b2a32"/>
  <rect x="472" y="18" width="73" height="20" rx="6" fill="#9b7df5"/>
  <text x="508" y="32" fill="#1b1a21" font-size="12" font-weight="600" text-anchor="middle">Board</text>
  <text x="583" y="32" fill="#a5a3ad" font-size="12" text-anchor="middle">Org</text>
  <!-- right controls -->
  <rect x="978" y="16" width="86" height="24" rx="7" fill="#2b2a32"/>
  <text x="1021" y="32" fill="#c9bcff" font-size="12" text-anchor="middle">+ Task</text>
  <rect x="1074" y="16" width="86" height="24" rx="7" fill="#9b7df5"/>
  <text x="1117" y="32" fill="#1b1a21" font-size="12" font-weight="600" text-anchor="middle">Hire ↗</text>
  <circle cx="1180" cy="28" r="5" fill="#5ec695"/>

  <!-- column headers + lanes -->
  <!-- helper geometry: x = 24 + i*194, width 178 -->
  <g font-size="13" font-weight="600">
    <!-- Backlog -->
    <circle cx="34" cy="88" r="5" fill="#a6a4b0"/><text x="46" y="93" fill="#e9e8ee">Backlog</text><text x="192" y="93" fill="#8b8994" text-anchor="end" font-family="JetBrains Mono, monospace" font-weight="400" font-size="12">2</text>
    <!-- To do -->
    <circle cx="228" cy="88" r="5" fill="#6fa0e6"/><text x="240" y="93" fill="#e9e8ee">To do</text><text x="386" y="93" fill="#8b8994" text-anchor="end" font-family="JetBrains Mono, monospace" font-weight="400" font-size="12">2</text>
    <!-- In progress -->
    <circle cx="422" cy="88" r="5" fill="#ab8cf2"/><text x="434" y="93" fill="#e9e8ee">In progress</text><text x="580" y="93" fill="#8b8994" text-anchor="end" font-family="JetBrains Mono, monospace" font-weight="400" font-size="12">2</text>
    <!-- In review -->
    <circle cx="616" cy="88" r="5" fill="#e0b45c"/><text x="628" y="93" fill="#e9e8ee">In review</text><text x="774" y="93" fill="#8b8994" text-anchor="end" font-family="JetBrains Mono, monospace" font-weight="400" font-size="12">1</text>
    <!-- Blocked -->
    <circle cx="810" cy="88" r="5" fill="#e77c6b"/><text x="822" y="93" fill="#e9e8ee">Blocked</text><text x="968" y="93" fill="#8b8994" text-anchor="end" font-family="JetBrains Mono, monospace" font-weight="400" font-size="12">1</text>
    <!-- Done -->
    <circle cx="1004" cy="88" r="5" fill="#5ec695"/><text x="1016" y="93" fill="#e9e8ee">Done</text><text x="1162" y="93" fill="#8b8994" text-anchor="end" font-family="JetBrains Mono, monospace" font-weight="400" font-size="12">2</text>
  </g>

  <!-- lane backgrounds (muted/40) -->
  <g fill="#232229" opacity="0.55">
    <rect x="24"  y="106" width="178" height="590" rx="10"/>
    <rect x="218" y="106" width="178" height="590" rx="10"/>
    <rect x="412" y="106" width="178" height="590" rx="10"/>
    <rect x="606" y="106" width="178" height="590" rx="10"/>
    <rect x="800" y="106" width="178" height="590" rx="10"/>
    <rect x="994" y="106" width="178" height="590" rx="10"/>
  </g>

  <!-- ============ CARDS ============ -->
  <!-- reusable look: card #232229 border #34333b, 4px left rail = status hue -->
  <g font-family="Inter, sans-serif">
    <!-- BACKLOG col x=24 -->
    <g transform="translate(34,118)">
      <rect width="158" height="70" rx="9" fill="#232229" stroke="#34333b"/>
      <rect width="4" height="70" rx="2" fill="#a6a4b0"/>
      <text x="14" y="24" fill="#e9e8ee" font-size="12.5" font-weight="500">Secrets management:</text>
      <text x="14" y="40" fill="#e9e8ee" font-size="12.5" font-weight="500">vault-backed store</text>
      <text x="14" y="59" fill="#8b8994" font-size="11">— low · 2d</text>
    </g>
    <g transform="translate(34,198)">
      <rect width="158" height="54" rx="9" fill="#232229" stroke="#34333b"/>
      <rect width="4" height="54" rx="2" fill="#a6a4b0"/>
      <text x="14" y="24" fill="#e9e8ee" font-size="12.5" font-weight="500">Routines: scheduled tasks</text>
      <text x="14" y="43" fill="#8b8994" font-size="11">— low · 3d</text>
    </g>

    <!-- TO DO col x=218 -->
    <g transform="translate(228,118)">
      <rect width="158" height="54" rx="9" fill="#232229" stroke="#34333b"/>
      <rect width="4" height="54" rx="2" fill="#6fa0e6"/>
      <text x="14" y="24" fill="#e9e8ee" font-size="12.5" font-weight="500">Tool-access enforcement</text>
      <text x="14" y="43" fill="#e0b45c" font-size="11">↑ high · 5h</text>
    </g>
    <g transform="translate(228,182)">
      <rect width="158" height="70" rx="9" fill="#232229" stroke="#34333b"/>
      <rect width="4" height="70" rx="2" fill="#6fa0e6"/>
      <text x="14" y="24" fill="#e9e8ee" font-size="12.5" font-weight="500">Sandbox: firejail</text>
      <text x="14" y="40" fill="#e9e8ee" font-size="12.5" font-weight="500">profile per run</text>
      <text x="14" y="59" fill="#8b8994" font-size="11">— medium · 1d</text>
    </g>

    <!-- IN PROGRESS col x=412 -->
    <g transform="translate(422,118)">
      <rect width="158" height="76" rx="9" fill="#232229" stroke="#34333b"/>
      <rect width="4" height="76" rx="2" fill="#ab8cf2"/>
      <text x="14" y="24" fill="#e9e8ee" font-size="12.5" font-weight="500">Hash-chain: verify</text>
      <text x="14" y="40" fill="#e9e8ee" font-size="12.5" font-weight="500">endpoint</text>
      <text x="14" y="59" fill="#8b8994" font-size="11">↑ high · 12m</text>
      <rect x="96" y="49" width="52" height="16" rx="8" fill="#9b7df5" opacity="0.16"/>
      <text x="122" y="61" fill="#b79bf7" font-size="10" text-anchor="middle">◈ Aria</text>
    </g>
    <g transform="translate(422,204)">
      <rect width="158" height="60" rx="9" fill="#232229" stroke="#34333b"/>
      <rect width="4" height="60" rx="2" fill="#ab8cf2"/>
      <text x="14" y="24" fill="#e9e8ee" font-size="12.5" font-weight="500">Board drag-and-drop</text>
      <text x="14" y="44" fill="#8b8994" font-size="11">— medium · 1h</text>
      <rect x="86" y="34" width="62" height="16" rx="8" fill="#9b7df5" opacity="0.16"/>
      <text x="117" y="46" fill="#b79bf7" font-size="10" text-anchor="middle">◈ Kaede</text>
    </g>

    <!-- IN REVIEW col x=606 -->
    <g transform="translate(616,118)">
      <rect width="158" height="76" rx="9" fill="#232229" stroke="#34333b"/>
      <rect width="4" height="76" rx="2" fill="#e0b45c"/>
      <text x="14" y="24" fill="#e9e8ee" font-size="12.5" font-weight="500">Atomic budget</text>
      <text x="14" y="40" fill="#e9e8ee" font-size="12.5" font-weight="500">checkout</text>
      <text x="14" y="59" fill="#e77c6b" font-size="11">⇈ urgent · 4m</text>
      <rect x="96" y="49" width="52" height="16" rx="8" fill="#9b7df5" opacity="0.16"/>
      <text x="122" y="61" fill="#b79bf7" font-size="10" text-anchor="middle">◈ Rusto</text>
    </g>

    <!-- BLOCKED col x=800 -->
    <g transform="translate(810,118)">
      <rect width="158" height="76" rx="9" fill="#232229" stroke="#34333b"/>
      <rect width="4" height="76" rx="2" fill="#e77c6b"/>
      <text x="14" y="24" fill="#e9e8ee" font-size="12.5" font-weight="500">Wadachi errno24:</text>
      <text x="14" y="40" fill="#e9e8ee" font-size="12.5" font-weight="500">too many open files</text>
      <text x="14" y="59" fill="#e77c6b" font-size="11">↑ high · 3h</text>
    </g>

    <!-- DONE col x=994 -->
    <g transform="translate(1004,118)">
      <rect width="158" height="60" rx="9" fill="#232229" stroke="#34333b"/>
      <rect width="4" height="60" rx="2" fill="#5ec695"/>
      <text x="14" y="24" fill="#c7c6cf" font-size="12.5" font-weight="500">M2 runner + worktrees</text>
      <text x="14" y="44" fill="#8b8994" font-size="11">— medium · 1d</text>
    </g>
    <g transform="translate(1004,188)">
      <rect width="158" height="60" rx="9" fill="#232229" stroke="#34333b"/>
      <rect width="4" height="60" rx="2" fill="#5ec695"/>
      <text x="14" y="24" fill="#c7c6cf" font-size="12.5" font-weight="500">Onboarding flow</text>
      <text x="14" y="44" fill="#8b8994" font-size="11">— low · 2d</text>
    </g>
  </g>
</svg>
